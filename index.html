<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiseUP — Çok Yakında</title>
    <meta name="description" content="LiseUP — Kuralları Belirleyenler İçin. Çok yakında sizlerle.">
    <meta property="og:title" content="LiseUP — Çok Yakında">
    <meta property="og:description" content="Kuralları Belirleyenler İçin">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://liseup.org">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #7B6BF0;
            --accent-dim: rgba(123, 107, 240, 0.15);
            --accent-glow: rgba(123, 107, 240, 0.4);
            --bg: #000000;
            --white: #FFFFFF;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Garet', 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            cursor: none;
        }

        /* ── Cursor glow ── */
        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(123, 107, 240, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
            opacity: 0;
        }

        body:hover .cursor-glow {
            opacity: 1;
        }

        /* ── Scrolling marquee ── */
        .marquee {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 3;
            overflow: hidden;
            height: 32px;
            display: flex;
            align-items: center;
            background: linear-gradient(to right, rgba(0,0,0,0.8), transparent 10%, transparent 90%, rgba(0,0,0,0.8));
        }

        .marquee-track {
            display: flex;
            white-space: nowrap;
            animation: marqueeScroll 20s linear infinite;
        }

        .marquee-text {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.06);
            padding: 0 40px;
        }

        @keyframes marqueeScroll {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* ── Floating orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(123, 107, 240, 0.08);
            top: -100px;
            right: -100px;
            animation: orbFloat1 18s ease-in-out infinite alternate;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(90, 70, 220, 0.06);
            bottom: -50px;
            left: -80px;
            animation: orbFloat2 22s ease-in-out infinite alternate;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: rgba(140, 120, 255, 0.05);
            top: 40%;
            left: 60%;
            animation: orbFloat3 15s ease-in-out infinite alternate;
        }

        @keyframes orbFloat1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-80px, 120px) scale(1.2); }
        }
        @keyframes orbFloat2 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, -80px) scale(1.15); }
        }
        @keyframes orbFloat3 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-60px, -60px) scale(0.85); }
        }

        /* ── Particle canvas ── */
        #particles {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ── Subtle grid overlay ── */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 0.04;
            background-image:
                linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        /* ── Film grain ── */
        .grain {
            position: fixed;
            inset: 0;
            z-index: 9;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 128px 128px;
        }

        /* ── Sweeping gradient beam ── */
        .sweep-beam {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: linear-gradient(
                105deg,
                transparent 0%,
                transparent 40%,
                rgba(123, 107, 240, 0.06) 45%,
                rgba(123, 107, 240, 0.12) 50%,
                rgba(123, 107, 240, 0.06) 55%,
                transparent 60%,
                transparent 100%
            );
            background-size: 300% 100%;
            animation: sweepBeam 6s ease-in-out infinite;
        }

        @keyframes sweepBeam {
            0% { background-position: 150% 0; }
            100% { background-position: -150% 0; }
        }

        /* ── Main content ── */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 0 24px;
        }

        /* ── Staggered entrance ── */
        .anim-in {
            opacity: 0;
            transform: translateY(24px) scale(0.96);
            animation: enterIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .anim-in:nth-child(1) { animation-delay: 0.1s; }
        .anim-in:nth-child(2) { animation-delay: 0.35s; }
        .anim-in:nth-child(3) { animation-delay: 0.55s; }
        .anim-in:nth-child(4) { animation-delay: 0.7s; }
        .anim-in:nth-child(5) { animation-delay: 0.85s; }
        .anim-in:nth-child(6) { animation-delay: 1.0s; }

        @keyframes enterIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── Hero logo — massive with 3D float, glow & orbiting rings ── */
        .logo-wrapper {
            perspective: 800px;
            margin-bottom: 0;
        }

        .logo-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            width: 280px;
            height: 280px;
            position: relative;
            animation: float3D 8s ease-in-out infinite, enterIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform-style: preserve-3d;
            filter: drop-shadow(0 0 40px var(--accent-glow)) drop-shadow(0 0 80px var(--accent-dim));
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        /* Pulsing glow ring behind logo */
        .logo::before {
            content: '';
            position: absolute;
            inset: -30px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            animation: pulseGlow 3s ease-in-out infinite alternate;
            z-index: -1;
        }

        /* Orbiting rings */
        .orbit-ring {
            position: absolute;
            border: 1px solid rgba(123, 107, 240, 0.2);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            pointer-events: none;
        }

        .orbit-ring-1 {
            width: 320px;
            height: 120px;
            margin-left: -160px;
            margin-top: -60px;
            animation: orbitSpin1 10s linear infinite;
            transform-style: preserve-3d;
        }

        .orbit-ring-2 {
            width: 360px;
            height: 100px;
            margin-left: -180px;
            margin-top: -50px;
            border-color: rgba(123, 107, 240, 0.12);
            animation: orbitSpin2 14s linear infinite;
            transform-style: preserve-3d;
        }

        .orbit-ring-3 {
            width: 290px;
            height: 140px;
            margin-left: -145px;
            margin-top: -70px;
            border-color: rgba(123, 107, 240, 0.08);
            animation: orbitSpin3 18s linear infinite;
            transform-style: preserve-3d;
        }

        /* Small dot on orbit */
        .orbit-ring::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            top: -2px;
            left: 50%;
            margin-left: -2px;
            box-shadow: 0 0 8px var(--accent);
        }

        @keyframes orbitSpin1 {
            from { transform: rotateX(70deg) rotateZ(0deg); }
            to { transform: rotateX(70deg) rotateZ(360deg); }
        }
        @keyframes orbitSpin2 {
            from { transform: rotateX(60deg) rotateY(30deg) rotateZ(0deg); }
            to { transform: rotateX(60deg) rotateY(30deg) rotateZ(360deg); }
        }
        @keyframes orbitSpin3 {
            from { transform: rotateX(75deg) rotateY(-20deg) rotateZ(0deg); }
            to { transform: rotateX(75deg) rotateY(-20deg) rotateZ(360deg); }
        }

        @keyframes float3D {
            0%, 100% {
                transform: rotateY(0deg) rotateX(0deg) translateY(0px);
            }
            25% {
                transform: rotateY(8deg) rotateX(-3deg) translateY(-10px);
            }
            50% {
                transform: rotateY(0deg) rotateX(0deg) translateY(-5px);
            }
            75% {
                transform: rotateY(-8deg) rotateX(3deg) translateY(-10px);
            }
        }

        @keyframes pulseGlow {
            0% { opacity: 0.4; transform: scale(0.9); }
            100% { opacity: 0.8; transform: scale(1.1); }
        }

        /* ── Brand wordmark ── */
        .wordmark {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-top: -4px;
        }

        /* ── Heading ── */
        .heading {
            font-size: clamp(2.8rem, 9vw, 5.5rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1.05;
        }

        .heading .accent {
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-dim);
        }

        /* ── Accent divider ── */
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 2px;
        }

        /* ── Tagline ── */
        .tagline {
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.06em;
            text-shadow: 0 0 20px var(--accent-dim);
        }

        /* ── Glassmorphism countdown ── */
        .countdown {
            display: flex;
            gap: 14px;
            margin-top: 8px;
        }

        .countdown-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 80px;
            padding: 16px 12px 12px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .countdown-card:hover {
            border-color: rgba(123, 107, 240, 0.3);
            box-shadow: 0 0 20px rgba(123, 107, 240, 0.1);
        }

        .countdown-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .countdown-number {
            font-size: clamp(1.8rem, 5vw, 2.8rem);
            font-weight: 800;
            line-height: 1;
            color: var(--white);
            transition: transform 0.15s, opacity 0.15s;
        }

        .countdown-number.tick {
            animation: numTick 0.3s ease-out;
        }

        @keyframes numTick {
            0% { transform: scale(1.15); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .countdown-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 6px;
        }

        /* ── Wave visualization ── */
        .wave-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 2.5px;
            z-index: 2;
            padding: 0 20px;
            overflow: hidden;
            mask-image: linear-gradient(to top, black 60%, transparent);
            -webkit-mask-image: linear-gradient(to top, black 60%, transparent);
        }

        .wave-bar {
            width: 3px;
            border-radius: 2px 2px 0 0;
            transform-origin: bottom;
            animation: waveAnim 2s ease-in-out infinite alternate;
            background: linear-gradient(to top, var(--accent), rgba(123, 107, 240, 0.2));
        }

        @keyframes waveAnim {
            0% { transform: scaleY(1); }
            100% { transform: scaleY(0.3); }
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            body { cursor: auto; }

            .logo-container {
                width: 180px;
                height: 180px;
            }

            .logo {
                width: 180px;
                height: 180px;
            }

            .logo::before {
                inset: -20px;
            }

            .orbit-ring-1 {
                width: 220px;
                height: 80px;
                margin-left: -110px;
                margin-top: -40px;
            }
            .orbit-ring-2 {
                width: 250px;
                height: 70px;
                margin-left: -125px;
                margin-top: -35px;
            }
            .orbit-ring-3 {
                width: 200px;
                height: 95px;
                margin-left: -100px;
                margin-top: -47px;
            }

            .countdown {
                gap: 8px;
            }

            .countdown-card {
                min-width: 60px;
                padding: 12px 8px 10px;
                border-radius: 12px;
            }

            .wave-container {
                height: 60px;
            }

            .grid-overlay {
                background-size: 40px 40px;
            }

            .orb-1 { width: 250px; height: 250px; }
            .orb-2 { width: 200px; height: 200px; }
            .orb-3 { width: 150px; height: 150px; }

            .marquee { height: 26px; }
            .marquee-text { font-size: 0.6rem; }
        }

        @media (hover: none) {
            body { cursor: auto; }
            .cursor-glow { display: none; }
        }
    </style>
</head>
<body>
    <!-- Cursor glow -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- Scrolling marquee -->
    <div class="marquee">
        <div class="marquee-track" id="marqueeTrack"></div>
    </div>

    <!-- Floating orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Particle canvas -->
    <canvas id="particles"></canvas>

    <!-- Overlays -->
    <div class="grid-overlay"></div>
    <div class="grain"></div>
    <div class="sweep-beam"></div>

    <!-- Main content -->
    <div class="content">
        <div class="logo-wrapper anim-in">
            <div class="logo-container">

                <div class="orbit-ring orbit-ring-1"></div>
                <div class="orbit-ring orbit-ring-2"></div>
                <div class="orbit-ring orbit-ring-3"></div>

        // ── Countdown with tick animation ──
        const target = new Date('2026-04-22T00:00:00').getTime();
        let prevValues = { days: '', hours: '', minutes: '', seconds: '' };

        function tickAnim(el) {
            el.classList.remove('tick');
            void el.offsetWidth; // force reflow
            el.classList.add('tick');
        }

        function updateCountdown() {
            const now = Date.now();
            const diff = target - now;

            if (diff <= 0) {
                ['days','hours','minutes','seconds'].forEach(id => {
                    document.getElementById(id).textContent = '0';
                });
                return;
            }

            const d = String(Math.floor(diff / (1000 * 60 * 60 * 24)));
            const h = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
            const m = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
            const s = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');

            const vals = { days: d, hours: h, minutes: m, seconds: s };

            for (const [key, val] of Object.entries(vals)) {
                const el = document.getElementById(key);
                if (prevValues[key] !== val) {
                    el.textContent = val;
                    tickAnim(el);
                }
            }
            prevValues = vals;
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        // ── Particle Network with Mouse Interaction ──
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let w, h, particles;
        const PARTICLE_COUNT = 80;
        const CONNECTION_DIST = 140;
        const MOUSE_RADIUS = 120;
        const MOUSE_FORCE = 2;
        const AR = 123, AG = 107, AB = 240;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }

        function createParticles() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    r: Math.random() * 1.5 + 0.5
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, w, h);

            // Connections
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONNECTION_DIST) {
                        const alpha = (1 - dist / CONNECTION_DIST) * 0.15;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(${AR},${AG},${AB},${alpha})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            }

            // Also draw lines to mouse if close
            for (const p of particles) {
                const dx = p.x - mouseX;
                const dy = p.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < MOUSE_RADIUS * 1.5) {
                    const alpha = (1 - dist / (MOUSE_RADIUS * 1.5)) * 0.2;
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(mouseX, mouseY);
                    ctx.strokeStyle = `rgba(${AR},${AG},${AB},${alpha})`;
                    ctx.lineWidth = 0.4;
                    ctx.stroke();
                }
            }

            // Dots + movement + mouse repulsion
            for (const p of particles) {
                // Mouse repulsion
                const dx = p.x - mouseX;
                const dy = p.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < MOUSE_RADIUS && dist > 0) {
                    const force = (1 - dist / MOUSE_RADIUS) * MOUSE_FORCE;
                    p.vx += (dx / dist) * force * 0.1;
                    p.vy += (dy / dist) * force * 0.1;
                }

                // Dampen
                p.vx *= 0.98;
                p.vy *= 0.98;

                // Move
                p.x += p.vx;
                p.y += p.vy;

                // Bounce
                if (p.x < 0 || p.x > w) p.vx *= -1;
                if (p.y < 0 || p.y > h) p.vy *= -1;
                p.x = Math.max(0, Math.min(w, p.x));
                p.y = Math.max(0, Math.min(h, p.y));

                // Draw
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${AR},${AG},${AB},0.5)`;
                ctx.fill();
            }

            requestAnimationFrame(drawParticles);
        }

        resize();
        createParticles();
        drawParticles();
        window.addEventListener('resize', () => { resize(); createParticles(); });

        // ── Wave Bars ──
        const wave = document.getElementById('wave');
        const barCount = Math.floor(window.innerWidth / 5.5);

        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar';
            const pos = i / barCount;
            const height = 20 + 55 * Math.pow(Math.sin(pos * Math.PI), 2) * (0.5 + 0.5 * Math.sin(pos * Math.PI * 4));
            bar.style.height = height + 'px';
            bar.style.animationDelay = (i * 0.03) + 's';
            bar.style.animationDuration = (1.5 + Math.random() * 1) + 's';
            wave.appendChild(bar);
        }
    </script>
</body>
</html>
